services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?}
      POSTGRES_DB: ${DATABASE_NAME:-consultant_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-consultant_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  migrate:
    build:
      context: .
      dockerfile: db/Dockerfile.migrations
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:?}@db:5432/${DATABASE_NAME:-consultant_platform}
      DB_MIGRATION_MAX_ATTEMPTS: ${DB_MIGRATION_MAX_ATTEMPTS:-20}
      DB_MIGRATION_RETRY_DELAY_SECONDS: ${DB_MIGRATION_RETRY_DELAY_SECONDS:-5}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/db-migrate-ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${AI_SERVICE_PORT:-8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_AUDIO_MODEL: ${OPENAI_AUDIO_MODEL:-whisper-1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${APP_PORT:-3000}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-consultant_platform}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?}
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:?}@db:5432/${DATABASE_NAME:-consultant_platform}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?}
      AI_SERVICE_URL: http://ai:${AI_SERVICE_PORT:-8000}
    depends_on:
      migrate:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
