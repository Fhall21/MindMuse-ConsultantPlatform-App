services:
  db:
    # pgvector/pgvector:pg15 is postgres:15 + the vector extension pre-installed.
    # Required for analytics term embeddings (CREATE EXTENSION vector).
    # When deploying to Coolify for the first time, or after a DB wipe, the
    # extension is created automatically by the migration. On an existing DB
    # run once: psql -U <user> -d <db> -c "CREATE EXTENSION IF NOT EXISTS vector;"
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?}
      POSTGRES_DB: ${DATABASE_NAME:-consultant_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  migrate:
    build:
      context: .
      dockerfile: db/Dockerfile.migrations
    restart: unless-stopped
    exclude_from_hc: true
    command: ["sh", "-lc", "echo 'Migration shell ready'; tail -f /dev/null"]
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-consultant_platform}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${AI_SERVICE_PORT:-8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_AUDIO_MODEL: ${OPENAI_AUDIO_MODEL:-whisper-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_SITE_URL: ${APP_SITE_URL:?}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
        AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8000}
        DATABASE_HOST: ${DATABASE_HOST:-db}
        DATABASE_PORT: ${DATABASE_PORT:-5432}
        DATABASE_NAME: ${DATABASE_NAME:-consultant_platform}
        DATABASE_USER: ${DATABASE_USER:-postgres}
        DATABASE_PASSWORD: ${DATABASE_PASSWORD:?}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      APP_SITE_URL: ${APP_SITE_URL:?}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-consultant_platform}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8000}
    depends_on:
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
