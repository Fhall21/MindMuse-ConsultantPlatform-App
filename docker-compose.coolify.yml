services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?}
      POSTGRES_DB: ${DATABASE_NAME:-consultant_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${AI_SERVICE_PORT:-8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_AUDIO_MODEL: ${OPENAI_AUDIO_MODEL:-whisper-1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_SITE_URL: ${APP_SITE_URL:?}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
        AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:${AI_SERVICE_PORT:-8000}}
        ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?}
        DATABASE_HOST: ${DATABASE_HOST:-db}
        DATABASE_PORT: ${DATABASE_PORT:-5432}
        DATABASE_NAME: ${DATABASE_NAME:-consultant_platform}
        DATABASE_USER: ${DATABASE_USER:-postgres}
        DATABASE_PASSWORD: ${DATABASE_PASSWORD:?}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${APP_PORT:-3000}
      APP_SITE_URL: ${APP_SITE_URL:?}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-consultant_platform}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:${AI_SERVICE_PORT:-8000}}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?}
    depends_on:
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
