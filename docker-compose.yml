services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consultant_platform
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AI_SERVICE_URL: http://ai:${AI_SERVICE_PORT:-8000}
    depends_on:
      - db
      - ai

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8000}:${AI_SERVICE_PORT:-8000}"
    environment:
      PORT: ${AI_SERVICE_PORT:-8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_AUDIO_MODEL: ${OPENAI_AUDIO_MODEL:-whisper-1}

volumes:
  pgdata:
